<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Birthday Surprise 🎂
    </title>

    <!-- CSS -->

    <link rel="stylesheet"
          href="style.css">
    <link rel="stylesheet"
          href="mobile-responsive.css">

    <!-- GOOGLE FONTS -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <!-- STARS -->

    <div class="stars"></div>

    <!-- ================================= -->
    <!-- NAVBAR -->
    <!-- ================================= -->

    <nav id="navbar">

        <div class="logo">

            Bhavanaa 🎉

        </div>

        <ul class="nav-links">

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="journey.html">
                    Journey
                </a>
            </li>

            <li>
                <a href="chats.html">
                    Chats
                </a>
            </li>

            <li>
                <a href="gallery.html">
                    Gallery
                </a>
            </li>

            <li>
                <a href="surprise.html">
                    Surprise
                </a>
            </li>

            <li>
                <a href="letter.html">
                    Letter
                </a>
            </li>

        </ul>

    </nav>

    <!-- PAGE TRANSITION -->

    <div class="page-transition"></div>

    <!-- ================================= -->
    <!-- SURPRISE PAGE -->
    <!-- ================================= -->

    <section id="surprise-page">

        <!-- GLOW -->

        <div class="surprise-glow"></div>

        <!-- TITLE -->

        <h1>

            One Last Surprise 🎁

        </h1>

        <!-- SUBTITLE -->

        <p class="surprise-text">

            Some friendships
            slowly become
            lifelong memories ✨

        </p>

        <!-- CAKE AREA -->

        <div class="cake-container">

            <!-- CAKE -->

            <div class="cake">

                <!-- CANDLES -->

                <div class="candles">

                    <!-- CANDLE -->

                    <div class="candle">

                        <div class="flame"></div>

                    </div>

                    <!-- CANDLE -->

                    <div class="candle">

                        <div class="flame"></div>

                    </div>

                    <!-- CANDLE -->

                    <div class="candle">

                        <div class="flame"></div>

                    </div>

                </div>

                <!-- CAKE BODY -->

                <div class="cake-body"></div>

            </div>

        </div>

        <!-- QUOTE -->

        <div class="birthday-quote">

            “Thank you for being
            part of the memories
            that made life brighter 🎉”

        </div>

        <!-- BUTTON -->

        <button id="blow-btn">

            Blow Candles 🎂

        </button>

        <!-- FINAL MESSAGE BUTTON -->

        <div class="page-btn">

            <a href="letter.html">

                <button>

                    Final Message ✨

                </button>

            </a>

        </div>

    </section>

    <!-- ================================= -->
    <!-- MUSIC PLAYER -->
    <!-- ================================= -->

    <div id="music-player">

        <!-- DISC -->

        <div class="music-disc">

            🎵

        </div>

        <!-- INFO -->

        <div class="music-info">

            <h4>

                Birthday Vibes

            </h4>

            <p>

                cinematic memories

            </p>

        </div>

        <!-- CONTROLS -->

        <div class="music-controls">

            <button id="music-toggle">

                ▶

            </button>

        </div>

        <!-- AUDIO -->

        <audio id="bg-music"
               loop>

            <source
                src="assets/music/song.mp3"
                type="audio/mp3">

        </audio>

    </div>

    <div class="custom-cursor"></div>

    <!-- SCRIPT -->

    <script src="script.js"></script>

</body>

</html>
