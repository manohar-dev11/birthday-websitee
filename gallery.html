<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Memory Gallery 📸
    </title>

    <link rel="icon" href="assets/images/favicon.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="style.css">
    <link rel="stylesheet"
          href="mobile-responsive.css">

    <!-- GOOGLE FONTS -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <!-- STARS -->

    <div class="stars"></div>

    <!-- ================================= -->
    <!-- NAVBAR -->
    <!-- ================================= -->

    <nav id="navbar">

        <div class="logo">

            Bhavanaa 🎉

        </div>

        <ul class="nav-links">

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="journey.html">
                    Journey
                </a>
            </li>

            <li>
                <a href="chats.html">
                    Chats
                </a>
            </li>

            <li>
                <a href="gallery.html">
                    Gallery
                </a>
            </li>

            <li>
                <a href="surprise.html">
                    Surprise
                </a>
            </li>

            <li>
                <a href="letter.html">
                    Letter
                </a>
            </li>

        </ul>

    </nav>

    <!-- PAGE TRANSITION -->

    <div class="page-transition"></div>

    <!-- ================================= -->
    <!-- GALLERY PAGE -->
    <!-- ================================= -->

    <section id="gallery-page">

        <!-- TITLE -->

        <h1>

            Memory Gallery 📸

        </h1>

        <!-- SUBTITLE -->

        <p class="gallery-subtitle">

            Some memories
            deserved more than
            just staying inside a phone gallery ✨

        </p>

        <!-- GALLERY GRID -->

        <div class="photo-grid">

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/1.jpeg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/2.jpg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/3.jpg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/5.jpg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/6.jpg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/7.png"
                    alt="memory"
                    class="gallery-media">

            </div>

            <div class="photo-card video-card">

                <video
                    class="gallery-media"
                    muted
                    autoplay
                    loop
                    playsinline>

                    <source
                        src="assets/videos/video2.mp4"
                        type="video/mp4">

                </video>

                <!-- VIDEO ICON -->

                <div class="video-indicator">

                    ▶

                </div>

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/11.jpeg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/12.jpg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/13.png"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- IMAGE -->

            <div class="photo-card">

                <img
                    src="assets/images/14.png"
                    alt="memory"
                    class="gallery-media">

            </div>

            <div class="photo-card">

                <img
                    src="assets/images/17.jpg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <div class="photo-card">

                <img
                    src="assets/images/16.png"
                    alt="memory"
                    class="gallery-media">

            </div>

            <div class="photo-card">

                <img
                    src="assets/images/18.jpg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <div class="photo-card">

                <img
                    src="assets/images/19.jpg"
                    alt="memory"
                    class="gallery-media">

            </div>

            <!-- VIDEO -->

            <div class="photo-card video-card">

                <video
                    class="gallery-media"
                    muted
                    autoplay
                    loop
                    playsinline>

                    <source
                        src="assets/videos/video1.mp4"
                        type="video/mp4">

                </video>

                <!-- VIDEO ICON -->

                <div class="video-indicator">

                    ▶

                </div>

            </div>

        </div>

        <!-- NEXT BUTTON -->

        <div class="page-btn">

            <a href="surprise.html">

                <button>

                    Final Surprise 🎂

                </button>

            </a>

        </div>

    </section>

    <!-- ================================= -->
    <!-- POPUP -->
    <!-- ================================= -->

    <div id="image-popup">

        <!-- CLOSE -->

        <span id="close-image">

            ✖

        </span>

        <!-- IMAGE -->

        <img id="popup-img"
             alt=""
             style="display:none">

        <!-- VIDEO -->

        <video id="popup-video"
               controls
               playsinline
               style="display:none">

        </video>

    </div>

    <!-- ================================= -->
    <!-- MUSIC PLAYER -->
    <!-- ================================= -->

    <div id="music-player">

        <!-- DISC -->

        <div class="music-disc">

            🎵

        </div>

        <!-- INFO -->

        <div class="music-info">

            <h4>

                Birthday Vibes

            </h4>

            <p>

                cinematic memories

            </p>

        </div>

        <!-- CONTROLS -->

        <div class="music-controls">

            <button id="music-toggle">

                ▶

            </button>

        </div>

        <!-- AUDIO -->

        <audio id="bg-music"
               loop>

            <source
                src="assets/music/song.mp3"
                type="audio/mp3">

        </audio>

    </div>

    <div class="custom-cursor"></div>
    <!-- SCRIPT -->

    <script src="script.js"></script>

</body>

</html>
